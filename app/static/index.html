<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>签名提取器 — 笔迹透明化</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=2" type="text/css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">签名提取器</h1>
      <p class="tagline">将笔迹与背景分离，一键导出透明 PNG</p>
    </header>

    <main class="main">
      <section class="upload-section">
        <div class="drop-zone" id="dropZone" data-state="idle" data-has-file="false">
          <input type="file" id="fileInput" accept="image/*" hidden>
          <div class="drop-zone-placeholder" id="dropZonePlaceholder">
            <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
            <p class="drop-text">拖放图片到此处，或点击选择</p>
            <p class="drop-hint">支持 PNG、JPG、WEBP，最大 10MB</p>
          </div>
          <div class="drop-zone-preview" id="dropZonePreview" hidden>
            <img id="dropZoneImage" alt="已选图片">
            <p class="drop-filename" id="dropFileName"></p>
            <button type="button" class="drop-upload-btn drop-change-btn" id="changeFileBtn">
              <svg class="drop-upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                <line x1="12" y1="11" x2="12" y2="17"/>
                <line x1="9" y1="14" x2="15" y2="14"/>
              </svg>
              上传图片
            </button>
            <p class="drop-upload-hint">也可将图片拖放到此处替换</p>
          </div>
        </div>
      </section>

      <section class="controls-section" id="controlsSection" hidden>
        <div class="control-group">
          <label class="control-label">
            <span>亮度阈值</span>
            <span class="threshold-value" id="thresholdValue">160</span>
          </label>
          <input type="range" id="thresholdSlider" class="slider" min="80" max="230" value="160" step="5">
          <p class="control-hint">数值越大保留越多笔迹，越小背景更干净</p>
        </div>
        <button type="button" class="btn btn-primary" id="extractBtn">
          <span class="btn-text">提取签名</span>
          <span class="btn-loader" hidden></span>
        </button>
      </section>

      <section class="preview-section" id="previewSection" hidden>
        <div class="preview-grid">
          <div class="preview-card">
            <h3>原图</h3>
            <div class="preview-frame">
              <img id="originalPreview" alt="原图预览">
            </div>
          </div>
          <div class="preview-card">
            <h3>提取结果</h3>
            <div class="preview-frame preview-frame--checkered" id="resultFrame">
              <img id="resultPreview" alt="提取结果" hidden>
              <p class="placeholder" id="resultPlaceholder">点击「提取签名」生成</p>
            </div>
            <button type="button" class="btn btn-secondary" id="downloadBtn" hidden>
              下载 PNG
            </button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>数据在您的浏览器本地处理，不会上传至任何服务器</p>
    </footer>
  </div>
  <script src="/app.js?v=2"></script>
</body>
</html>
